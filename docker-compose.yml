services:
  taskflow:
    build: .
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DATA_DIR: /app/data
      ADMIN_EMAILS: "you@example.com"
      # To use Postgres instead of SQLite, uncomment the next line and the db service.
      # DATABASE_URL: postgres://taskflow:taskflow@db:5432/taskflow
    volumes:
      - taskflow-data:/app/data

